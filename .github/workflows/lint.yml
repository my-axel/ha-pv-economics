name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff mypy homeassistant
      - name: Ruff
        run: ruff check custom_components/pv_economics/
      - name: Mypy
        run: mypy custom_components/pv_economics/
